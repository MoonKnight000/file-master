spring.application.name=file-master
server.port=7788
# --- Datasource (local Postgres; override via env in prod) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/filemaster}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:9654}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# --- Uploads (multipart) ---
spring.servlet.multipart.file-size-threshold=20MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=210MB
# Don't let Tomcat cut slow large uploads, and don't abort the connection when a body
# isn't fully read (avoids ClientAbort/EOF on big multipart requests).
server.tomcat.connection-timeout=120s
server.tomcat.max-swallow-size=-1

# --- MinIO object storage ---
app.storage.endpoint=${MINIO_ENDPOINT:http://152.70.163.69:9000}
app.storage.access-key=${MINIO_ACCESS_KEY:uysotdev}
app.storage.secret-key=${MINIO_SECRET_KEY:ij45hntn7v8u3c48etue4thu}
app.storage.bucket=${MINIO_BUCKET:loki}
#app.storage.endpoint=${MINIO_ENDPOINT:http://192.168.88.36:9000}
#app.storage.access-key=${MINIO_ACCESS_KEY:minioadmin}
#app.storage.secret-key=${MINIO_SECRET_KEY:minioadmin123}
