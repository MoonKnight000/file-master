# --- Conversion limits ---
app.limits.max-file-bytes=104857600
app.limits.retention-minutes=60
# Premium results are kept for 7 days (free: retention-minutes above).
app.limits.retention-minutes-premium=10080
# true = no plan gating; batch upload/convert (and merge/unzip) allowed for everyone.
app.limits.free-batch-convert=true
# Rolling-24h conversion quotas (<= 0 disables the check; PREMIUM is always unlimited).
app.limits.daily-conversions-guest=10
app.limits.daily-conversions-free=30
# Max input files per conversion job (free/guest vs premium).
app.limits.max-batch-files-free=5
app.limits.max-batch-files=20
# How long UPLOADED source files are kept (free: 24h, premium: 30 days). Uploads still
# referenced by a queued/processing job are never swept regardless of age.
app.limits.upload-retention-minutes=1440
app.limits.upload-retention-minutes-premium=43200
# A job stuck in queued/processing longer than this is failed by the stale-job reaper.
app.limits.stale-job-minutes=60

# --- Auth (session token lifetimes) ---
# Short-lived access token; the front refreshes via POST /v1/auth/refresh.
app.auth.access-ttl-minutes=60
# Rotating refresh token window (renewed on every refresh).
app.auth.refresh-ttl-days=30

# --- Billing ---
# Shared secret the payment provider's callback must send in X-Webhook-Secret.
# Empty = webhook disabled. Set a long random value in prod.
app.billing.webhook-secret=${BILLING_WEBHOOK_SECRET:}

# --- External conversion tools (absolute paths so they work regardless of PATH) ---
app.tools.soffice-path=${SOFFICE_PATH:C:/Program Files/LibreOffice/program/soffice.exe}
app.tools.ffmpeg-path=${FFMPEG_PATH:C:/Program Files/ffmpeg/bin/ffmpeg.exe}
# Ghostscript (compress-pdf) and Tesseract (ocr-scan) — absolute paths so they work regardless of PATH.
app.tools.gs-path=${GS_PATH:C:/Program Files/gs/gs10.07.1/bin/gswin64c.exe}
app.tools.tesseract-path=${TESSERACT_PATH:C:/Program Files/Tesseract-OCR/tesseract.exe}
app.tools.djvu-path=${DJVU_PATH:C:/Program Files (x86)/DjVuLibre/ddjvu.exe}
app.tools.work-dir=${WORK_DIR:${java.io.tmpdir}/file-master}
app.tools.timeout-seconds=180
# --- AI tools: models live outside the repo (large binaries) ---
# remove-background: u2net ONNX model (in-JVM, no external process).
app.tools.u2net-model-path=${U2NET_MODEL_PATH:C:/Users/Surface PC/file-master-models/u2net.onnx}
# audio-to-text: whisper.cpp CLI + ggml model. Transcription gets its own (longer) timeout.
app.tools.whisper-path=${WHISPER_PATH:C:/Users/Surface PC/file-master-models/whisper/Release/whisper-cli.exe}
app.tools.whisper-model-path=${WHISPER_MODEL_PATH:C:/Users/Surface PC/file-master-models/ggml-small.bin}
app.tools.whisper-timeout-seconds=900

# --- CORS (Next.js front-end) ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# --- Google Sign-In (OAuth 2.0 Web client id; ID tokens must have this `aud`) ---
app.google.client-id=${GOOGLE_CLIENT_ID:}

# --- Swagger / OpenAPI (springdoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
